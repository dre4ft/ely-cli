<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ely — WebApp</title>
<style>
:root { --bg: #0d1117; --fg: #c9d1d9; --dim: #6e7681; --cyan: #58a6ff; --green: #3fb950;
         --red: #f85149; --yellow: #d29922; --panel: #161b22; --border: #30363d; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,sans-serif;
        height:100vh; display:flex; flex-direction:column; }
header { padding:8px 16px; border-bottom:1px solid var(--border); font-size:13px; display:flex; gap:16px; }
header .dot { color:var(--green); }
#conv { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
#conv .msg { max-width:85%; padding:10px 14px; border-radius:8px; line-height:1.6; }
#conv .user { align-self:flex-end; background:var(--cyan); color:#fff; }
#conv .agent { align-self:flex-start; background:var(--panel); border:1px solid var(--border); }
#conv .tool { align-self:flex-start; background:var(--panel); border-left:3px solid var(--cyan); font-size:12px; color:var(--dim); }
#conv .reasoning { align-self:flex-start; background:var(--panel); border-left:3px solid var(--dim); font-size:12px; color:var(--dim); font-style:italic; }
#conv .error { align-self:center; color:var(--red); font-size:12px; }
#conv .status { align-self:center; color:var(--dim); font-size:12px; }
#input-area { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; }
#input-area input { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--fg);
                     padding:10px 14px; border-radius:6px; font-size:14px; outline:none; }
#input-area input:focus { border-color:var(--cyan); }
#input-area button { background:var(--cyan); color:#fff; border:none; padding:10px 18px; border-radius:6px;
                      cursor:pointer; font-weight:600; }
#input-area button:hover { opacity:.9; }
footer { padding:6px 16px; border-top:1px solid var(--border); font-size:11px; color:var(--dim);
          display:flex; gap:16px; }
pre { background:#0d1117; padding:8px; border-radius:4px; overflow-x:auto; margin:4px 0; }
code { font-size:13px; }
</style>
</head>
<body>
<header>
  <span><span class="dot">●</span> <b>Ely</b></span>
  <span id="model">...</span>
  <span id="ctx">ctx: default</span>
  <span id="tokens">🪙 0</span>
</header>

<div id="conv"></div>

<div id="input-area">
  <input id="input" placeholder="Message, ?question, #cmd, ou /help..." autofocus
         onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">Send</button>
</div>

<footer>
  <span>? = quick LLM</span> <span># = bash</span> <span>/ = commands</span>
</footer>

<script>
const conv = document.getElementById('conv');
const input = document.getElementById('input');
let currentMsg = null;
let streamBuffer = '';

function addMsg(role, content) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.innerHTML = content;
    conv.appendChild(d);
    conv.scrollTop = conv.scrollHeight;
    return d;
}

function addStatus(text) {
    const d = document.createElement('div');
    d.className = 'status';
    d.textContent = text;
    conv.appendChild(d);
    conv.scrollTop = conv.scrollHeight;
    return d;
}

async function send() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMsg('user', msg);

    const statusEl = addStatus('⏳ ...');
    const resp = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg}),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let agentEl = null;
    let reasoningEl = null;

    while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});

        // Parse SSE events
        const parts = buf.split('\n\n');
        buf = parts.pop(); // Keep incomplete part

        for (const part of parts) {
            const lines = part.split('\n');
            let event = '', data = '';
            for (const line of lines) {
                if (line.startsWith('event: ')) event = line.slice(7);
                else if (line.startsWith('data: ')) data = line.slice(6);
            }
            if (!event) continue;

            statusEl?.remove();

            if (event === 'stream') {
                if (!agentEl) agentEl = addMsg('agent', '');
                streamBuffer += data;
                agentEl.innerHTML = marked.parse(streamBuffer);
                conv.scrollTop = conv.scrollHeight;
            } else if (event === 'reasoning') {
                if (!reasoningEl) reasoningEl = addMsg('reasoning', '');
                if (reasoningEl.textContent.length < 400)
                    reasoningEl.textContent += data;
            } else if (event === 'tool_calls') {
                const tcs = JSON.parse(data);
                for (const tc of tcs)
                    addMsg('tool', `🔧 <b>${tc.name}</b> ${tc.args.slice(0,100)}`);
            } else if (event === 'tool_result') {
                addMsg('tool', `⮡ ${data.slice(0,200)}`);
            } else if (event === 'done') {
                const d = JSON.parse(data);
                if (agentEl) agentEl.innerHTML = marked.parse(d.reply || '');
                streamBuffer = '';
                agentEl = null; reasoningEl = null;
                document.getElementById('tokens').textContent = `🪙 ${d.total_tokens?.toLocaleString() || 0}`;
            } else if (event === 'error') {
                addMsg('error', data);
            } else if (event === 'bash') {
                addMsg('agent', `<pre>${data}</pre>`);
            } else if (event === 'cleared') {
                conv.innerHTML = '';
                addStatus('✨ Cleared');
            } else if (event === 'help') {
                addMsg('agent', data);
            }
        }
    }
}

// Load marked.js for markdown
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
document.head.appendChild(script);
</script>
</body>
</html>
